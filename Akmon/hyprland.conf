source = ~/.config/hypr/hyprland-start-up.conf

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt5ct
env = LIBVA_DRIVER_NAME,nvidia
env = __GLX_VENDOR_LIBRARY_NAME,nvidia

monitor = desc:Dell Inc. DELL S3222DGM CXFDKK3, 2560x1440@59.95, -2560x0, auto
monitor = desc:Dell Inc. DELL S3222DGM HGN9W64, 2560x1440@59.95, 0x0, auto

workspace = special:gromit, gapsin:0, gapsout:0, on-created-empty: gromit-mpx -a

input {
    kb_layout = us,
    # kb_variant = intl,
    # kb_options = caps:swapescape,
    follow_mouse = 2
    sensitivity = 0
    numlock_by_default = true
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 3
    gaps_out = 0
    border_size = 3
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle

    allow_tearing = false
}

decoration {

    rounding = 3

    blur {
        enabled = false
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

cursor {
    inactive_timeout = 3
}

plugin:dynamic-cursors {
  enabled = true
  mode = none
  threshold = 2

  shake {
    enabled = true
    nearest = true
    threshold = 6.0
    base = 4.0
    speed = 4.0
    influence = 0.0
    limit = 0.0
    timeout = 2000
    effects = false
    ipc = false
  }

  hyprcursor {
    nearest = true
    enabled = true
    resolution = -1
    fallback = clientside
  }
}

misc {
    disable_hyprland_logo = 1
}

ecosystem {
  no_update_news = true
  no_donation_nag = true
}

$mainMod = SUPER
#bindit = , SUPER_L, exec, pkill -SIGUSR1 waybar
#binditr = , SUPER_L, exec, sleep 1.5 && pkill -SIGUSR1 waybar
#bind = $mainMod, 0, exec, pkill -SIGUSR1 waybar

# bind = , F12, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 0
# bindr = , F12, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ 1

bind = $mainMod, SPACE, exec, rofi -show drun

bind = $mainMod, D, killactive
bind = $mainMod SHIFT, D, exec, bash ~/.config/rofi/kill-menu.sh

bind = $mainMod, x, exec, copyq toggle


bind = , F8, exec, gromit-mpx --undo
bind = SHIFT , F8, exec, gromit-mpx --redo
bind = , F9, exec, gromit-mpx --toggle
bind = $mainMod, F9, exec, gromit-mpx -a
bind = $mainMod SHIFT, F9, exec, gromit-mpx -q

bind = $mainMod, S, exec, brave

bind = $mainMod, L, exec, brave --app=https://track.toggl.com/timer --start-maximized
bind = $mainMod SHIFT, L, exec, brave --app=https://exist.io/ --start-maximized

bind = $mainMod, 0, exec, emacs --eval "(add-hook 'window-setup-hook (lambda () (switch-to-buffer \"*scratch*\") (delete-other-windows)))"
bind = $mainMod, T, exec, emacs --eval '(progn (vterm) (delete-other-windows))'
bind = $mainMod, F, exec, emacs -f dirvish
bind = $mainMod, E, exec, emacs -f my/open-daily-journal
bind = $mainMod, N, exec, emacs --name "doom-capture" -f my/popup-capture
bind = $mainMod, C, exec, emacs --name "emacs-calc" -f my/popup-calc
bind = $mainMod SHIFT, C, exec, emacs --name "emacs-calc-static" --title "emacs-calc-static" --eval '(progn (calc) (delete-other-windows))'
bind = $mainMod, U, exec, emacs --name "emacs-scratch" -f my/quick-write-clipboard



bind = $mainMod SHIFT, T, exec, thunar ~/Downloads/
bind = $mainMod, G, exec, brave --app=https://gemini.google.com/app --start-maximized
bind = $mainMod SHIFT, G, togglespecialworkspace, st
bind = $mainMod, Z, exec, zotero

bind = $mainMod SHIFT, Q, exec, bash /etc/scripts/clean-power-off-akmon.sh
bind = $mainMod, Q, exec, waylock -init-color 0x000000 -input-color 0x0a6e73 -fail-color 0x000000

bind = $mainMod, B, exec, rofi -show window

bind = $mainMod SHIFT, P, exec, bitwarden

bind =, XF86MonBrightnessUp, exec, brightnessctl set +5%
bind =, XF86MonBrightnessDown, exec, brightnessctl set 5%-

bind =, XF86AudioRaiseVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%+
bind =, XF86AudioLowerVolume, exec, wpctl set-volume -l 1.4 @DEFAULT_AUDIO_SINK@ 5%-
bind =, XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

bind = $mainMod, J, togglesplit,
bind = $mainMod SHIFT, J, togglefloating

bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

bind = $mainMod ALT, left, movecurrentworkspacetomonitor, l
bind = $mainMod ALT, right, movecurrentworkspacetomonitor, r

bind = $mainMod SHIFT, period, resizeactive, 180 0
bind = $mainMod SHIFT, comma, resizeactive, -180 0
bind = $mainMod, period, resizeactive, 0 -180
bind = $mainMod, comma, resizeactive, 0 180
bind = $mainMod ALT SHIFT, period, resizeactive, 30 0
bind = $mainMod ALT SHIFT, comma, resizeactive, -30 0
bind = $mainMod ALT, period, resizeactive, 0 -30
bind = $mainMod ALT, comma, resizeactive, 0 30

bind = $mainMod, M, exec, brave --app=https://www.youtube.com --start-maximized
bind = $mainMod SHIFT, M, fullscreen, 1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bind = , Sys_Req, exec, hyprshot -m region --clipboard-only
bind = , mouse:274, exec, hyprshot -m region --clipboard-only
bind = SHIFT, mouse:274, exec, hyprshot -m region -o ~/Downloads

bind = ALT, SPACE, exec, bash /etc/scripts/quick-macro.sh

bind = ALT SUPER CTRL SHIFT, SPACE, exec, pgrep wl-kbptr && pkill wl-kbptr || wl-kbptr -o modes=floating,click -o mode_floating.source=detect
bind = ALT SUPER CTRL SHIFT, RETURN, exec, pgrep wl-kbptr && pkill wl-kbptr || wl-kbptr

windowrule = match:class ^(doom-capture)$, float 1, size 1000 800, center 1
windowrule = match:class ^(emacs-calc)$, float 1, size 1000 800, center 1
windowrule = match:class ^(emacs-scratch)$, float 1, size 1000 800, center 1
windowrule = match:title ^(127.0.0.1_/)$, workspace special:st silent
